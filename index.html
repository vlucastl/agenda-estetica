<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Estética Compartilhada</title>
    
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Garantindo que os modais comecem invisíveis */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            z-index: 999; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6); 
            align-items: center; 
            justify-content: center;
        }
        #calendar { max-width: 1100px; margin: 0 auto; }
        .fc-event { cursor: pointer; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="authSection" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
            <h1 class="text-3xl font-bold text-pink-600 mb-6">Acesso ao Sistema</h1>
            <div class="space-y-4 text-left">
                <input type="text" id="userName" placeholder="Nome Completo (Cadastro)" class="w-full border p-3 rounded">
                <input type="email" id="userEmail" placeholder="E-mail" class="w-full border p-3 rounded">
                <input type="password" id="userPass" placeholder="Senha" class="w-full border p-3 rounded">
                <button onclick="handleAuth('signup')" class="w-full bg-pink-600 text-white p-3 rounded font-bold">Criar Conta</button>
                <button onclick="handleAuth('login')" class="w-full border border-pink-600 text-pink-600 p-3 rounded font-bold">Entrar</button>
                <button onclick="loginWithGoogle()" class="w-full border p-3 rounded flex items-center justify-center gap-2">Entrar com Google</button>
            </div>
        </div>
    </div>

    <div id="appSection" class="hidden container mx-auto p-4">
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Olá, <span id="displayUserName" class="text-pink-600">...</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="openModal()" class="bg-pink-600 text-white py-2 px-6 rounded-full font-bold shadow-lg">+ Novo</button>
                <button onclick="logout()" class="text-red-500 underline text-sm">Sair</button>
            </div>
        </header>
        <div class="bg-white shadow-xl rounded-xl p-4">
            <div id="calendar"></div>
        </div>
    </div>

    <div id="bookingModal" class="modal-overlay">
        <div class="bg-white rounded-lg p-8 w-full max-w-md shadow-2xl relative">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">Agendar Serviço</h2>
            <div class="space-y-4">
                <label class="block text-sm font-medium">Profissional</label>
                <select id="profSelect" class="w-full border rounded p-2 bg-gray-50"></select>
                
                <label class="block text-sm font-medium">Serviço / Cliente</label>
                <input type="text" id="service" class="w-full border rounded p-2">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium">Valor</label>
                        <input type="number" id="price" class="w-full border rounded p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Duração</label>
                        <select id="duration" class="w-full border rounded p-2">
                            <option value="30">30 min</option>
                            <option value="60">1 hora</option>
                            <option value="90">1h 30min</option>
                            <option value="120">2 horas</option>
                        </select>
                    </div>
                </div>
                <label class="block text-sm font-medium">Início</label>
                <input type="datetime-local" id="startTime" class="w-full border rounded p-2">
            </div>

            <div class="mt-6 flex justify-between items-center border-t pt-4">
                <button id="btnDelete" onclick="openConfirmModal()" class="text-red-500 font-bold hidden">Excluir</button>
                <div class="flex space-x-3 ml-auto">
                    <button onclick="closeModal()" class="text-gray-500 px-4">Cancelar</button>
                    <button onclick="saveAppointment()" class="bg-pink-600 text-white px-6 py-2 rounded-lg font-bold">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay" style="z-index: 1000;">
        <div class="bg-white rounded-lg p-6 w-full max-w-sm shadow-2xl text-center">
            <div class="text-red-500 mb-4 text-4xl">⚠️</div>
            <h3 class="text-xl font-bold mb-2">Tem certeza?</h3>
            <p class="text-gray-500 mb-6">Deseja mesmo excluir este agendamento?</p>
            <div class="flex justify-center gap-3">
                <button onclick="closeConfirmModal()" class="px-4 py-2 text-gray-500">Voltar</button>
                <button onclick="executeDelete()" class="bg-red-500 text-white px-6 py-2 rounded-lg font-bold">Sim, Excluir</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, deleteDoc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVWRf6EOpZtdhtmJUS-QpK-4u5f8lCORQ",
            authDomain: "agenda-estetica-226d0.firebaseapp.com",
            projectId: "agenda-estetica-226d0",
            storageBucket: "agenda-estetica-226d0.firebasestorage.app",
            messagingSenderId: "420975956032",
            appId: "1:420975956032:web:00d9a7fc7941bb584a8fa5",
            measurementId: "G-70C8XN5SYN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let calendar;
        let selectedEventId = null;

        // AUTH
        window.handleAuth = async (type) => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            const name = document.getElementById('userName').value;
            try {
                if (type === 'signup') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), { name, email });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (e) { alert(e.message); }
        };

        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, new GoogleAuthProvider());
                await setDoc(doc(db, "users", result.user.uid), { name: result.user.displayName, email: result.user.email }, { merge: true });
            } catch (e) { alert(e.message); }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
                const userDoc = await getDoc(doc(db, "users", user.uid));
                document.getElementById('displayUserName').innerText = userDoc.exists() ? userDoc.data().name : user.displayName;
                initCalendar();
                loadProfessionals();
                loadEvents();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('appSection').classList.add('hidden');
            }
        });

        // CALENDÁRIO
        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            if (!calendar) {
                calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'timeGridWeek',
                    locale: 'pt-br',
                    slotMinTime: '08:00:00',
                    slotMaxTime: '20:00:00',
                    selectable: true,
                    select: (info) => {
                        selectedEventId = null;
                        document.getElementById('btnDelete').classList.add('hidden');
                        openModal(info.startStr.slice(0, 16));
                    },
                    eventClick: (info) => {
                        selectedEventId = info.event.id;
                        document.getElementById('btnDelete').classList.remove('hidden');
                        const p = info.event.extendedProps;
                        document.getElementById('service').value = p.service || "";
                        document.getElementById('price').value = p.price || "";
                        document.getElementById('profSelect').value = p.prof || "";
                        document.getElementById('duration').value = p.duration || "30";
                        document.getElementById('startTime').value = info.event.startStr.slice(0, 16);
                        openModal();
                    }
                });
                calendar.render();
            }
        }

        function loadEvents() {
            onSnapshot(collection(db, "appointments"), (snap) => {
                calendar.removeAllEvents();
                snap.forEach(doc => {
                    const d = doc.data();
                    const start = new Date(d.start);
                    calendar.addEvent({
                        id: doc.id,
                        title: `${d.prof}: ${d.service}`,
                        start: start,
                        end: new Date(start.getTime() + d.duration * 60000),
                        backgroundColor: '#db2777',
                        extendedProps: { ...d }
                    });
                });
            });
        }

        function loadProfessionals() {
            onSnapshot(collection(db, "users"), (snap) => {
                const s = document.getElementById('profSelect');
                s.innerHTML = "";
                snap.forEach(doc => s.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);
            });
        }

        // MODAIS E AÇÕES
        window.openModal = (date = "") => {
            document.getElementById('bookingModal').style.display = 'flex';
            if (date) document.getElementById('startTime').value = date;
        };

        window.closeModal = () => {
            document.getElementById('bookingModal').style.display = 'none';
            document.getElementById('service').value = "";
            document.getElementById('price').value = "";
            selectedEventId = null;
        };

        window.openConfirmModal = () => document.getElementById('confirmModal').style.display = 'flex';
        window.closeConfirmModal = () => document.getElementById('confirmModal').style.display = 'none';

        window.saveAppointment = async () => {
            const prof = document.getElementById('profSelect').value;
            const startStr = document.getElementById('startTime').value;
            const duration = parseInt(document.getElementById('duration').value);
            
            const newStart = new Date(startStr);
            const newEnd = new Date(newStart.getTime() + duration * 60000);

            try {
                // Validação de Conflito
                const q = query(collection(db, "appointments"), where("prof", "==", prof));
                const querySnapshot = await getDocs(q);
                
                let conflito = false;
                querySnapshot.forEach((docSnap) => {
                    if (docSnap.id === selectedEventId) return;

                    const d = docSnap.data();
                    const exStart = new Date(d.start);
                    const exEnd = new Date(exStart.getTime() + d.duration * 60000);

                    if (newStart < exEnd && exStart < newEnd) {
                        conflito = true;
                    }
                });

                if (conflito) {
                    alert("⚠️ Erro: O profissional já possui um agendamento neste horário!");
                    return;
                }

                const data = {
                    prof,
                    service: document.getElementById('service').value,
                    price: document.getElementById('price').value,
                    start: startStr,
                    duration
                };

                if (selectedEventId) await updateDoc(doc(db, "appointments", selectedEventId), data);
                else await addDoc(collection(db, "appointments"), data);
                
                closeModal();
            } catch (e) { alert("Erro ao salvar: " + e.message); }
        };

        window.executeDelete = async () => {
            try {
                await deleteDoc(doc(db, "appointments", selectedEventId));
                closeConfirmModal();
                closeModal();
            } catch (e) { alert("Erro ao excluir: " + e.message); }
        };
    </script>
</body>
</html>
