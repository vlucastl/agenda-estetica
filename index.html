<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Estética Compartilhada</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .modal-overlay { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        #calendar { max-width: 1100px; margin: 0 auto; height: 85vh; }
        
        .fc-event { 
            cursor: pointer; 
            border: none !important; 
            padding: 1px 2px; 
            font-weight: bold; 
            border-radius: 4px; 
            font-size: 0.75rem;
        }

        @media (min-width: 768px) {
            .fc-event { font-size: 0.85rem; padding: 2px 4px; }
        }

        .event-concluido { border-left: 6px solid #059669 !important; }
        .event-cancelado { border-left: 6px solid #4b5563 !important; text-decoration: line-through; opacity: 0.6; }

        #loadingScreen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .color-sq { width: 34px; height: 34px; border-radius: 6px; cursor: pointer; border: 3px solid transparent; }
        .color-sq.active { border-color: #000; transform: scale(1.1); }

        .fc .fc-toolbar { flex-wrap: wrap; gap: 8px; }
        .fc .fc-toolbar-title { font-size: 1.1rem !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="loadingScreen">
        <div class="text-pink-600 font-bold animate-pulse text-xl text-center">Sincronizando Agenda...</div>
    </div>

    <div id="authSection" class="hidden flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-md text-center">
            <h1 class="text-2xl font-bold text-pink-600 mb-6">Acesso ao Sistema</h1>
            <div class="space-y-4 text-left">
                <input type="text" id="userName" placeholder="Nome Completo" class="w-full border p-3 rounded">
                <input type="email" id="userEmail" placeholder="E-mail" class="w-full border p-3 rounded">
                <div class="relative">
                    <input type="password" id="userPass" placeholder="Senha" class="w-full border p-3 rounded pr-12">
                    <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-xl opacity-50">
                        <span id="eyeIcon">👁️</span>
                    </button>
                </div>
                <button onclick="handleAuth('signup')" class="w-full bg-pink-600 text-white p-3 rounded font-bold">Criar Conta</button>
                <button onclick="handleAuth('login')" class="w-full border border-pink-600 text-pink-600 p-3 rounded font-bold">Entrar</button>
                <div class="flex items-center my-4"><div class="flex-grow border-t"></div><span class="mx-3 text-gray-400 text-sm">OU</span><div class="flex-grow border-t"></div></div>
                <button onclick="loginWithGoogle()" class="w-full border p-3 rounded flex items-center justify-center gap-2 text-gray-600 font-medium">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5"> Entrar com Google
                </button>
            </div>
        </div>
    </div>

    <div id="appSection" class="hidden container mx-auto p-2 md:p-4">
        <header class="flex justify-between items-center mb-4 bg-white p-3 md:p-4 rounded-lg shadow-sm">
            <h1 class="text-lg md:text-2xl font-bold text-gray-800">Olá, <span id="displayUserName" class="text-pink-600">...</span></h1>
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="window.selectedEventId = null; openModal();" class="bg-pink-600 text-white py-2 px-4 md:px-6 rounded-full font-bold shadow-lg text-sm md:text-base">+ Novo</button>
                <button onclick="logout()" class="text-red-500 underline text-xs md:text-sm">Sair</button>
            </div>
        </header>

        <div class="flex gap-2 mb-4">
            <button onclick="switchTab('agenda')" id="tabAgenda" class="bg-pink-600 text-white px-4 py-2 rounded-lg font-bold shadow-md">📅 Agenda</button>
            <button onclick="switchTab('financeiro')" id="tabFinance" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-bold shadow-md">💰 Financeiro</button>
        </div>

        <div id="agendaSection" class="bg-white shadow-xl rounded-xl p-2 md:p-4">
            <div id="calendar"></div>
        </div>

        <div id="financeSection" class="hidden space-y-4">
            <div class="bg-white p-4 md:p-6 rounded-xl shadow-md">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Resumo Financeiro</h2>
                
                <div class="flex justify-between items-center mb-4 bg-gray-50 p-2 rounded-lg border">
                    <button onclick="changeFinanceWeek(-1)" class="bg-white text-gray-700 px-3 py-1 rounded border shadow-sm hover:bg-gray-100 font-bold text-sm">⬅️ Anterior</button>
                    <span id="financeWeekLabel" class="font-bold text-gray-700 text-sm text-center">Calculando...</span>
                    <button onclick="changeFinanceWeek(1)" class="bg-white text-gray-700 px-3 py-1 rounded border shadow-sm hover:bg-gray-100 font-bold text-sm">Próxima ➡️</button>
                </div>

                <p class="text-xs text-gray-400 mb-4">* Clique no profissional para ver detalhes</p>
                <div id="financeList" class="divide-y"></div>
            </div>
        </div>
    </div>

    <div id="bookingModal" class="modal-overlay">
        <div class="bg-white rounded-lg p-6 md:p-8 w-[95%] max-w-md shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <h2 id="modalTitle" class="text-xl font-bold mb-4 border-b pb-2">Agendar Serviço</h2>
            <div class="space-y-4">
                <label class="block text-sm font-medium">Profissional</label>
                <select id="profSelect" class="w-full border rounded p-2 bg-gray-50 focus:ring-2 focus:ring-pink-500 outline-none"></select>
                <input type="text" id="service" placeholder="Serviço / Cliente" class="w-full border rounded p-2 focus:ring-2 focus:ring-pink-500 outline-none">
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="price" placeholder="Valor R$" class="w-full border rounded p-2 focus:ring-2 focus:ring-pink-500 outline-none">
                    <input type="number" id="percentage" placeholder="Comissão %" class="w-full border rounded p-2 focus:ring-2 focus:ring-pink-500 outline-none">
                    <select id="duration" class="w-full border rounded p-2">
                        <option value="30">30 min</option><option value="60">1 hora</option><option value="90">1h 30m</option><option value="120">2 horas</option>
                    </select>
                </div>
                <input type="datetime-local" id="startTime" class="w-full border rounded p-2">
                <div id="colorPalette" class="flex flex-wrap gap-2"></div>
                <input type="hidden" id="eventColor" value="#db2777">
            </div>
            <div class="mt-6 flex justify-between gap-3 pt-4 border-t">
                <button onclick="closeModal()" class="text-gray-500 px-2 font-medium">Cancelar</button>
                <button id="btnSaveMain" onclick="saveAppointment()" class="bg-pink-600 text-white px-6 py-2 rounded-lg font-bold flex-1">Salvar</button>
            </div>
        </div>
    </div>

    <div id="detailsModal" class="modal-overlay">
        <div class="bg-white rounded-lg p-6 md:p-8 w-[95%] max-w-md shadow-2xl relative border-t-8 border-pink-600">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">Detalhes</h2>
            <div id="detailsContent" class="space-y-3 text-sm text-gray-700">
                <p><strong>Prof:</strong> <span id="detProf"></span></p>
                <p><strong>Serviço:</strong> <span id="detService"></span></p>
                <p><strong>Valor:</strong> R$ <span id="detPrice"></span></p>
                <p><strong>Comissão:</strong> <span id="detPercentage"></span>%</p>
                <p><strong>Início:</strong> <span id="detStart"></span></p>
                <p class="text-xs">Registrado por: <span id="detCreatedBy"></span></p>
            </div>
            <div class="mt-6 space-y-2 pt-4 border-t">
                <div class="flex gap-2">
                    <button onclick="updateStatus('concluido')" class="flex-1 bg-green-600 text-white py-2 rounded-lg font-bold">✅ Concluir</button>
                    <button onclick="updateStatus('cancelado')" class="flex-1 bg-gray-500 text-white py-2 rounded-lg font-bold">🚫 Cancelar</button>
                </div>
                <button onclick="closeDetailsModal()" class="w-full text-gray-500 mt-2">Fechar</button>
            </div>
        </div>
    </div>

    <div id="financeDetailModal" class="modal-overlay">
        <div class="bg-white rounded-lg p-6 md:p-8 w-[95%] max-w-lg shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <h2 id="financeDetailTitle" class="text-xl font-bold mb-4 border-b pb-2 text-pink-600"></h2>
            <div id="financeDetailContent" class="space-y-3"></div>
            <div class="mt-6 pt-4 border-t text-right"><button onclick="closeFinanceDetailModal()" class="bg-gray-800 text-white px-6 py-2 rounded-lg font-bold">Fechar</button></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, deleteDoc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVWRf6EOpZtdhtmJUS-QpK-4u5f8lCORQ",
            authDomain: "agenda-estetica-226d0.firebaseapp.com",
            projectId: "agenda-estetica-226d0",
            storageBucket: "agenda-estetica-226d0.firebasestorage.app",
            messagingSenderId: "420975956032",
            appId: "1:420975956032:web:00d9a7fc7941bb584a8fa5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let calendar;
        let userData = {};
        let currentWeekOffset = 0;
        let financeDataByProf = {};
        const presetColors = ['#db2777', '#2563eb', '#10b981', '#f59e0b', '#7c3aed', '#dc2626'];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                userData = userDoc.exists() ? userDoc.data() : { name: user.displayName, email: user.email };
                document.getElementById('displayUserName').innerText = userData.name;
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
                initCalendar(); loadEvents(); loadProfessionals();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('appSection').classList.add('hidden');
            }
            document.getElementById('loadingScreen').style.display = 'none';
        });

        window.switchTab = (tab) => {
            document.getElementById('agendaSection').classList.toggle('hidden', tab !== 'agenda');
            document.getElementById('financeSection').classList.toggle('hidden', tab !== 'financeiro');
            if (tab === 'financeiro') { currentWeekOffset = 0; calculateFinance(); }
        };

        window.changeFinanceWeek = (direction) => {
            currentWeekOffset += direction;
            calculateFinance();
        };

        async function calculateFinance() {
            const list = document.getElementById('financeList');
            list.innerHTML = '<p class="p-4 text-center text-gray-500 animate-pulse">Buscando dados...</p>';

            const today = new Date();
            today.setDate(today.getDate() + (currentWeekOffset * 7));
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            startOfWeek.setHours(0, 0, 0, 0);
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);
            endOfWeek.setHours(23, 59, 59, 999);

            document.getElementById('financeWeekLabel').innerText = `${startOfWeek.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'})} até ${endOfWeek.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'})}`;

            // Correção da lógica ADMIN
            let q = (userData.role === 'admin') 
                ? query(collection(db, "appointments"), where("status", "==", "concluido"))
                : query(collection(db, "appointments"), where("status", "==", "concluido"), where("prof", "==", userData.name));

            const snap = await getDocs(q);
            let totals = {}; financeDataByProf = {};

            snap.forEach(doc => {
                const d = doc.data();
                const eventDate = new Date(d.start);
                if (eventDate >= startOfWeek && eventDate <= endOfWeek) {
                    if (!totals[d.prof]) { totals[d.prof] = { bruto: 0, comissao: 0 }; financeDataByProf[d.prof] = []; }
                    const v = parseFloat(d.price) || 0; const c = v * ((parseFloat(d.percentage) || 0) / 100);
                    totals[d.prof].bruto += v; totals[d.prof].comissao += c;
                    financeDataByProf[d.prof].push({ service: d.service, date: eventDate.toLocaleDateString('pt-BR'), bruto: v, liquido: c });
                }
            });

            list.innerHTML = Object.keys(totals).length ? "" : "<p class='p-6 text-center text-gray-400'>Nenhum registro.</p>";
            Object.keys(totals).forEach(prof => {
                list.innerHTML += `
                    <div onclick="showFinanceDetails('${prof}')" class="flex justify-between items-center py-4 px-2 cursor-pointer hover:bg-pink-50 rounded-lg">
                        <div><p class="font-bold text-gray-800">${prof}</p><p class="text-sm text-gray-500">Bruto: R$ ${totals[prof].bruto.toFixed(2)}</p></div>
                        <div class="text-right"><p class="text-green-600 font-bold text-xl">R$ ${totals[prof].comissao.toFixed(2)}</p><p class="text-[10px] text-gray-400 font-bold">A RECEBER</p></div>
                    </div>`;
            });
        }

        window.showFinanceDetails = (prof) => {
            const content = document.getElementById('financeDetailContent');
            document.getElementById('financeDetailTitle').innerText = `Detalhes: ${prof}`;
            content.innerHTML = financeDataByProf[prof].map(i => `
                <div class="p-3 bg-gray-50 rounded border-l-4 border-pink-500 flex justify-between">
                    <div><p class="font-bold">${i.service}</p><p class="text-xs text-gray-500">${i.date}</p></div>
                    <div class="text-right"><p class="text-xs text-gray-400">R$ ${i.bruto.toFixed(2)}</p><p class="text-sm text-green-600 font-bold">R$ ${i.liquido.toFixed(2)}</p></div>
                </div>`).join('');
            document.getElementById('financeDetailModal').style.display = 'flex';
        };

        window.closeFinanceDetailModal = () => document.getElementById('financeDetailModal').style.display = 'none';

        // Lógica de agendamento e autenticação padrão mantida...
        function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'timeGridDay', locale: 'pt-br', selectable: true,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridDay,listWeek' },
                select: (info) => openModal(info.startStr.slice(0, 16)),
                eventClick: (info) => showDetails(info.event)
            });
            calendar.render();
        }

        function loadEvents() {
            onSnapshot(collection(db, "appointments"), (snap) => {
                calendar.removeAllEvents();
                snap.forEach(doc => {
                    const d = doc.data();
                    calendar.addEvent({ id: doc.id, title: `${d.prof}: ${d.service}`, start: d.start, backgroundColor: d.color, extendedProps: d });
                });
            });
        }

        function loadProfessionals() {
            onSnapshot(collection(db, "users"), (snap) => {
                const s = document.getElementById('profSelect');
                s.innerHTML = '<option value="">Selecione...</option>';
                snap.forEach(doc => s.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);
                if (userData.role !== 'admin') { s.value = userData.name; s.disabled = true; }
            });
        }

        window.openModal = (date = "") => { document.getElementById('bookingModal').style.display = 'flex'; if(date) document.getElementById('startTime').value = date; };
        window.closeModal = () => document.getElementById('bookingModal').style.display = 'none';
        window.closeDetailsModal = () => document.getElementById('detailsModal').style.display = 'none';
        window.logout = () => { signOut(auth); location.reload(); };
        window.togglePassword = () => { const p = document.getElementById('userPass'); p.type = p.type === 'password' ? 'text' : 'password'; };
        
        window.saveAppointment = async () => {
            const data = {
                prof: document.getElementById('profSelect').value,
                service: document.getElementById('service').value,
                price: document.getElementById('price').value,
                percentage: document.getElementById('percentage').value,
                start: document.getElementById('startTime').value,
                duration: parseInt(document.getElementById('duration').value),
                color: document.getElementById('eventColor').value,
                creatorName: userData.name, status: 'agendado'
            };
            await addDoc(collection(db, "appointments"), data);
            closeModal();
        };

        window.updateStatus = async (status) => {
            await updateDoc(doc(db, "appointments", window.selectedEventId), { status });
            closeDetailsModal();
        };

        window.handleAuth = async (type) => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            if (type === 'signup') {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", res.user.uid), { name: document.getElementById('userName').value, email });
            } else { await signInWithEmailAndPassword(auth, email, pass); }
        };

        function showDetails(event) {
            window.selectedEventId = event.id;
            const p = event.extendedProps;
            document.getElementById('detProf').innerText = p.prof;
            document.getElementById('detService').innerText = p.service;
            document.getElementById('detPrice').innerText = p.price;
            document.getElementById('detPercentage').innerText = p.percentage;
            document.getElementById('detStart').innerText = new Date(p.start).toLocaleString('pt-BR');
            document.getElementById('detCreatedBy').innerText = p.creatorName;
            document.getElementById('detailsModal').style.display = 'flex';
        }
    </script>
</body>
</html>
