<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Estética Compartilhada</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .modal-overlay { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        #calendar { max-width: 1100px; margin: 0 auto; height: 85vh; }
        
        .fc-event { 
            cursor: pointer; 
            border: none !important; 
            padding: 1px 2px; 
            font-weight: bold; 
            border-radius: 4px; 
            font-size: 0.75rem;
        }

        @media (min-width: 768px) {
            .fc-event { font-size: 0.85rem; padding: 2px 4px; }
        }

        .event-concluido { border-left: 6px solid #059669 !important; }
        .event-cancelado { border-left: 6px solid #4b5563 !important; text-decoration: line-through; opacity: 0.6; }

        #loadingScreen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .color-sq { width: 34px; height: 34px; border-radius: 6px; cursor: pointer; border: 3px solid transparent; }
        .color-sq.active { border-color: #000; transform: scale(1.1); }

        .fc .fc-toolbar { flex-wrap: wrap; gap: 8px; }
        .fc .fc-toolbar-title { font-size: 1.1rem !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="loadingScreen">
        <div class="text-pink-600 font-bold animate-pulse text-xl text-center">Sincronizando Agenda...</div>
    </div>

    <div id="authSection" class="hidden flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-md text-center">
            <h1 class="text-2xl font-bold text-pink-600 mb-6">Acesso ao Sistema</h1>
            <div class="space-y-4 text-left">
                <input type="text" id="userName" placeholder="Nome Completo" class="w-full border p-3 rounded">
                <input type="email" id="userEmail" placeholder="E-mail" class="w-full border p-3 rounded">
                <div class="relative">
                    <input type="password" id="userPass" placeholder="Senha" class="w-full border p-3 rounded pr-12">
                    <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-xl opacity-50">
                        <span id="eyeIcon">👁️</span>
                    </button>
                </div>
                <button onclick="handleAuth('signup')" class="w-full bg-pink-600 text-white p-3 rounded font-bold">Criar Conta</button>
                <button onclick="handleAuth('login')" class="w-full border border-pink-600 text-pink-600 p-3 rounded font-bold">Entrar</button>
                <div class="flex items-center my-4"><div class="flex-grow border-t"></div><span class="mx-3 text-gray-400 text-sm">OU</span><div class="flex-grow border-t"></div></div>
                <button onclick="loginWithGoogle()" class="w-full border p-3 rounded flex items-center justify-center gap-2 text-gray-600 font-medium">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5"> Entrar com Google
                </button>
            </div>
        </div>
    </div>

    <div id="appSection" class="hidden container mx-auto p-2 md:p-4">
        <header class="flex justify-between items-center mb-4 bg-white p-3 md:p-4 rounded-lg shadow-sm">
            <h1 class="text-lg md:text-2xl font-bold text-gray-800">Olá, <span id="displayUserName" class="text-pink-600">...</span></h1>
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="window.selectedEventId = null; openModal();" class="bg-pink-600 text-white py-2 px-4 md:px-6 rounded-full font-bold shadow-lg text-sm md:text-base">+ Novo</button>
                <button onclick="logout()" class="text-red-500 underline text-xs md:text-sm">Sair</button>
            </div>
        </header>

        <div class="flex gap-2 mb-4">
            <button onclick="switchTab('agenda')" id="tabAgenda" class="bg-pink-600 text-white px-4 py-2 rounded-lg font-bold shadow-md">📅 Agenda</button>
            <button onclick="switchTab('financeiro')" id="tabFinance" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-bold shadow-md">💰 Financeiro</button>
        </div>

        <div id="agendaSection" class="bg-white shadow-xl rounded-xl p-2 md:p-4">
            <div id="calendar"></div>
        </div>

        <div id="financeSection" class="hidden space-y-4">
            <div class="bg-white p-4 md:p-6 rounded-xl shadow-md">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Resumo da Semana (Concluídos)</h2>
                <p class="text-xs text-gray-400 mb-4">* Clique no profissional para ver detalhes</p>
                <div id="financeList" class="divide-y">
                    </div>
            </div>
        </div>
    </div>

    <div id="bookingModal" class="modal-overlay">
        <div class="bg-white rounded-lg p-6 md:p-8 w-[95%] max-w-md shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <h2 id="modalTitle" class="text-xl font-bold mb-4 border-b pb-2">Agendar Serviço</h2>
            <div class="space-y-4">
                <label class="block text-sm font-medium">Profissional</label>
                <select id="profSelect" class="w-full border rounded p-2 bg-gray-50 focus:ring-2 focus:ring-pink-500 outline-none"></select>
                <input type="text" id="service" placeholder="Serviço / Cliente" class="w-full border rounded p-2 focus:ring-2 focus:ring-pink-500 outline-none">
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="price" placeholder="Valor R$" class="w-full border rounded p-2 focus:ring-2 focus:ring-pink-500 outline-none">
                    <input type="number" id="percentage" placeholder="Comissão %" class="w-full border rounded p-2 focus:ring-2 focus:ring-pink-500 outline-none">
                    <select id="duration" class="w-full border rounded p-2">
                        <option value="30">30 min</option>
                        <option value="60">1 hora</option>
                        <option value="90">1h 30m</option>
                        <option value="120">2 horas</option>
                        <option value="150">2h 30m</option>
                        <option value="180">3 horas</option>
                        <option value="210">3h 30m</option>
                        <option value="240">4 horas</option>
                        <option value="270">4h 30m</option>
                        <option value="300">5 horas</option>
                        <option value="330">5h 30m</option>
                        <option value="360">6 horas</option>
                    </select>
                </div>
                <input type="datetime-local" id="startTime" class="w-full border rounded p-2 focus:ring-2 focus:ring-pink-500 outline-none">
                <label class="block text-sm font-medium">Cor</label>
                <input type="hidden" id="eventColor" value="#db2777">
                <div id="colorPalette" class="flex flex-wrap gap-2"></div>
            </div>
            <div class="mt-6 flex justify-between gap-3 pt-4 border-t">
                <button onclick="closeModal()" class="text-gray-500 px-2 font-medium">Cancelar</button>
                <button id="btnSaveMain" onclick="saveAppointment()" class="bg-pink-600 text-white px-6 py-2 rounded-lg font-bold flex-1">Salvar</button>
            </div>
        </div>
    </div>

    <div id="detailsModal" class="modal-overlay">
        <div class="bg-white rounded-lg p-6 md:p-8 w-[95%] max-w-md shadow-2xl relative border-t-8 border-pink-600">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">Detalhes</h2>
            <div id="detailsContent" class="space-y-3 text-sm md:text-base text-gray-700">
                <p><strong>Prof:</strong> <span id="detProf"></span></p>
                <p><strong>Serviço:</strong> <span id="detService"></span></p>
                <p><strong>Valor:</strong> R$ <span id="detPrice"></span></p>
                <p><strong>Comissão:</strong> <span id="detPercentage"></span>%</p>
                <p><strong>Duração:</strong> <span id="detDuration"></span> min</p>
                <p><strong>Início:</strong> <span id="detStart"></span></p>
                <div class="p-3 bg-pink-50 rounded-lg border-l-4 border-pink-600">
                    <p class="text-xs">Registrado por: <span id="detCreatedBy" class="font-bold"></span></p>
                </div>
            </div>
            <div class="mt-6 space-y-2 pt-4 border-t">
                <div class="flex gap-2">
                    <button onclick="updateStatus('concluido')" class="flex-1 bg-green-600 text-white py-2 rounded-lg font-bold text-xs md:text-sm">✅ Concluir</button>
                    <button onclick="updateStatus('cancelado')" class="flex-1 bg-gray-500 text-white py-2 rounded-lg font-bold text-xs md:text-sm">🚫 Cancelar</button>
                </div>
                <div class="flex justify-between items-center">
                    <button onclick="closeDetailsModal()" class="text-gray-500 px-2">Fechar</button>
                    <div class="flex gap-2">
                        <button onclick="openEditFromDetails()" class="bg-gray-800 text-white px-3 py-2 rounded-lg font-bold text-xs">Editar</button>
                        <button onclick="openConfirmModal(); closeDetailsModal();" class="bg-red-500 text-white px-3 py-2 rounded-lg font-bold text-xs">Excluir</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="financeDetailModal" class="modal-overlay">
        <div class="bg-white rounded-lg p-6 md:p-8 w-[95%] max-w-lg shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <h2 id="financeDetailTitle" class="text-xl font-bold mb-4 border-b pb-2 text-pink-600"></h2>
            <div id="financeDetailContent" class="space-y-3">
                </div>
            <div class="mt-6 pt-4 border-t text-right">
                <button onclick="closeFinanceDetailModal()" class="bg-gray-800 text-white px-6 py-2 rounded-lg font-bold">Fechar</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay" style="z-index: 1000;"><div class="bg-white rounded-lg p-6 w-full max-sm shadow-2xl text-center"><h3 class="text-lg font-bold mb-4">Excluir?</h3><div class="flex justify-center gap-3"><button onclick="closeConfirmModal()" class="px-4 py-2 text-gray-500">Voltar</button><button onclick="executeDelete()" class="bg-red-500 text-white px-6 py-2 rounded-lg font-bold">Sim</button></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, deleteDoc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVWRf6EOpZtdhtmJUS-QpK-4u5f8lCORQ",
            authDomain: "agenda-estetica-226d0.firebaseapp.com",
            projectId: "agenda-estetica-226d0",
            storageBucket: "agenda-estetica-226d0.firebasestorage.app",
            messagingSenderId: "420975956032",
            appId: "1:420975956032:web:00d9a7fc7941bb584a8fa5",
            measurementId: "G-70C8XN5SYN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let calendar;
        window.selectedEventId = null;
        let userData = {};
        let financeDataByProf = {}; 
        const presetColors = ['#db2777', '#2563eb', '#10b981', '#f59e0b', '#7c3aed', '#dc2626', '#0891b2', '#4b5563', '#1e293b', '#000000'];

        window.togglePassword = () => {
            const pass = document.getElementById('userPass');
            const icon = document.getElementById('eyeIcon');
            if (pass.type === 'password') { pass.type = 'text'; icon.innerText = '🙈'; }
            else { pass.type = 'password'; icon.innerText = '👁️'; }
        };

        window.switchTab = (tab) => {
            const agenda = document.getElementById('agendaSection');
            const finance = document.getElementById('financeSection');
            const btnAgenda = document.getElementById('tabAgenda');
            const btnFinance = document.getElementById('tabFinance');

            if (tab === 'agenda') {
                agenda.classList.remove('hidden');
                finance.classList.add('hidden');
                btnAgenda.className = "bg-pink-600 text-white px-4 py-2 rounded-lg font-bold shadow-md";
                btnFinance.className = "bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-bold shadow-md";
                if(calendar) calendar.render();
            } else {
                agenda.classList.add('hidden');
                finance.classList.remove('hidden');
                btnFinance.className = "bg-pink-600 text-white px-4 py-2 rounded-lg font-bold shadow-md";
                btnAgenda.className = "bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-bold shadow-md";
                calculateFinance();
            }
        };

        async function calculateFinance() {
            const list = document.getElementById('financeList');
            list.innerHTML = '<p class="p-4 text-center text-gray-500 animate-pulse">Calculando recebimentos da semana...</p>';

            const today = new Date();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            startOfWeek.setHours(0, 0, 0, 0);

            // MUDANÇA DE PRIVACIDADE: Filtra se não for admin
            let q;
            if (userData.role !== 'admin') {
                q = query(
                    collection(db, "appointments"), 
                    where("status", "==", "concluido"),
                    where("prof", "==", userData.name)
                );
            } else {
                q = query(collection(db, "appointments"), where("status", "==", "concluido"));
            }

            const snap = await getDocs(q);
            
            let totals = {};
            financeDataByProf = {}; 

            snap.forEach(doc => {
                const d = doc.data();
                const eventDate = new Date(d.start);
                if (eventDate >= startOfWeek) {
                    if (!totals[d.prof]) {
                        totals[d.prof] = { bruto: 0, comissao: 0 };
                        financeDataByProf[d.prof] = [];
                    }
                    const valor = parseFloat(d.price) || 0;
                    const perc = parseFloat(d.percentage) || 0;
                    const valorComissao = (valor * (perc / 100));
                    
                    totals[d.prof].bruto += valor;
                    totals[d.prof].comissao += valorComissao;

                    financeDataByProf[d.prof].push({
                        service: d.service,
                        date: eventDate.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'}),
                        bruto: valor,
                        liquido: valorComissao
                    });
                }
            });

            list.innerHTML = "";
            const keys = Object.keys(totals);
            if (keys.length === 0) {
                list.innerHTML = "<p class='p-6 text-center text-gray-400'>Nenhum serviço concluído nesta semana.</p>";
                return;
            }

            keys.forEach(prof => {
                list.innerHTML += `
                    <div onclick="showFinanceDetails('${prof}')" class="flex justify-between items-center py-4 px-2 cursor-pointer hover:bg-pink-50 transition rounded-lg">
                        <div>
                            <p class="font-bold text-gray-800 text-lg">${prof}</p>
                            <p class="text-sm text-gray-500">Total Bruto: R$ ${totals[prof].bruto.toFixed(2)}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-green-600 font-bold text-xl">R$ ${totals[prof].comissao.toFixed(2)}</p>
                            <p class="text-[10px] uppercase text-gray-400 font-extrabold tracking-wider">A Receber</p>
                        </div>
                    </div>
                `;
            });
        }

        window.showFinanceDetails = (prof) => {
            const title = document.getElementById('financeDetailTitle');
            const content = document.getElementById('financeDetailContent');
            const data = financeDataByProf[prof];

            title.innerText = `Serviços de ${prof}`;
            content.innerHTML = "";

            data.forEach(item => {
                content.innerHTML += `
                    <div class="p-3 bg-gray-50 rounded-lg border-l-4 border-pink-500 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-gray-800">${item.service}</p>
                            <p class="text-xs text-gray-500">Data: ${item.date}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-gray-400">Bruto: R$ ${item.bruto.toFixed(2)}</p>
                            <p class="text-sm text-green-600 font-bold">Comissão: R$ ${item.liquido.toFixed(2)}</p>
                        </div>
                    </div>
                `;
            });

            document.getElementById('financeDetailModal').style.display = 'flex';
        };

        window.closeFinanceDetailModal = () => {
            document.getElementById('financeDetailModal').style.display = 'none';
        };

        function renderColorPalette() {
            const palette = document.getElementById('colorPalette');
            const currentColor = document.getElementById('eventColor').value;
            palette.innerHTML = '';
            presetColors.forEach(color => {
                const div = document.createElement('div');
                div.style.backgroundColor = color;
                div.className = `color-sq ${currentColor === color ? 'active' : ''}`;
                div.onclick = () => { document.getElementById('eventColor').value = color; renderColorPalette(); };
                palette.appendChild(div);
            });
        }

        onAuthStateChanged(auth, async (user) => {
            const loader = document.getElementById('loadingScreen');
            if (user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);
                if (!userDoc.exists()) {
                    userData = { name: user.displayName || user.email.split('@')[0], email: user.email };
                    await setDoc(userDocRef, userData);
                } else { userData = userDoc.data(); }
                document.getElementById('displayUserName').innerText = userData.name;
                initCalendar(); loadProfessionals(); loadEvents();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('appSection').classList.add('hidden');
            }
            if(loader) loader.style.display = 'none';
        });

        async function suggestColorForProf(profName) {
            if (!profName) return;
            const q = query(collection(db, "appointments"), where("prof", "==", profName));
            const snap = await getDocs(q);
            let lastColor = ""; let latest = 0;
            snap.forEach(ds => {
                const d = ds.data(); const time = new Date(d.start).getTime();
                if (time > latest) { latest = time; lastColor = d.color; }
            });
            if (lastColor) { document.getElementById('eventColor').value = lastColor; renderColorPalette(); }
        }

        document.getElementById('profSelect').addEventListener('change', (e) => suggestColorForProf(e.target.value));

        function initCalendar() {
            const el = document.getElementById('calendar');
            if (!el || calendar) return;
            const isMobile = window.innerWidth < 768;
            calendar = new FullCalendar.Calendar(el, {
                initialView: isMobile ? 'timeGridDay' : 'timeGridWeek',
                headerToolbar: {
                    left: 'prev,next today', center: 'title',
                    right: isMobile ? 'timeGridDay,listWeek' : 'timeGridWeek,timeGridDay,listWeek'
                },
                locale: 'pt-br', allDaySlot: false, slotMinTime: '00:00:00', slotMaxTime: '24:00:00',
                scrollTime: '08:00:00', height: 'auto', selectable: true, nowIndicator: true,
                select: (info) => { window.selectedEventId = null; openModal(info.startStr.slice(0, 16)); },
                eventClick: (info) => { showDetails(info.event); }
            });
            calendar.render();
        }

        function loadEvents() {
            onSnapshot(collection(db, "appointments"), (snap) => {
                if (calendar) {
                    calendar.removeAllEvents();
                    snap.forEach(doc => {
                        const d = doc.data();
                        let title = `${d.prof}: ${d.service}`;
                        let color = d.color || '#db2777';
                        let eventClasses = [];
                        if (d.status === 'concluido') { title = "✅ [OK] " + title; eventClasses.push('event-concluido'); }
                        else if (d.status === 'cancelado') { title = "❌ [CANC] " + title; color = "#9ca3af"; eventClasses.push('event-cancelado'); }
                        calendar.addEvent({
                            id: doc.id, title: title, start: d.start,
                            end: new Date(new Date(d.start).getTime() + d.duration * 60000),
                            backgroundColor: color, extendedProps: { ...d },
                            classNames: eventClasses
                        });
                    });
                    if(document.getElementById('financeSection').classList.contains('hidden') === false) calculateFinance();
                }
            });
        }

        function loadProfessionals() {
            onSnapshot(collection(db, "users"), (snap) => {
                const s = document.getElementById('profSelect');
                if (s) {
                    const cur = s.value; s.innerHTML = '<option value="">Selecione...</option>';
                    snap.forEach(doc => { if (doc.data().name) s.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`; });
                    
                    // MUDANÇA DE PRIVACIDADE: Trava o seletor no nome do usuário se não for admin
                    if (userData.role !== 'admin') {
                        s.value = userData.name;
                        s.disabled = true;
                    } else {
                        s.value = cur;
                        s.disabled = false;
                    }
                }
            });
        }

        window.openModal = (date = "") => {
            document.getElementById('bookingModal').style.display = 'flex';
            if (!window.selectedEventId) {
                document.getElementById('service').value = "";
                document.getElementById('price').value = "";
                document.getElementById('percentage').value = "";
                document.getElementById('modalTitle').innerText = "Agendar Serviço";
                if (date) document.getElementById('startTime').value = date;
            } else {
                document.getElementById('modalTitle').innerText = "Editar Agendamento";
            }
            renderColorPalette();
        };

        window.closeModal = () => { document.getElementById('bookingModal').style.display = 'none'; window.selectedEventId = null; };

        function showDetails(event) {
            window.selectedEventId = event.id; const p = event.extendedProps;
            document.getElementById('detProf').innerText = p.prof;
            document.getElementById('detService').innerText = p.service;
            document.getElementById('detPrice').innerText = p.price || "0";
            document.getElementById('detPercentage').innerText = p.percentage || "0";
            document.getElementById('detDuration').innerText = p.duration;
            document.getElementById('detStart').innerText = new Date(p.start).toLocaleString('pt-BR');
            document.getElementById('detCreatedBy').innerText = p.creatorName || "Desconhecido";
            document.getElementById('detailsModal').style.display = 'flex';
        }

        window.closeDetailsModal = () => document.getElementById('detailsModal').style.display = 'none';

        window.updateStatus = async (status) => {
            try { 
                await updateDoc(doc(db, "appointments", window.selectedEventId), { status: status }); 
                closeDetailsModal();
                if(!document.getElementById('financeSection').classList.contains('hidden')) calculateFinance();
            } catch (e) { alert(e.message); }
        };

        window.openEditFromDetails = () => {
            const event = calendar.getEventById(window.selectedEventId); const p = event.extendedProps;
            document.getElementById('service').value = p.service; 
            document.getElementById('price').value = p.price;
            document.getElementById('percentage').value = p.percentage || "";
            document.getElementById('profSelect').value = p.prof; 
            document.getElementById('duration').value = p.duration;
            document.getElementById('startTime').value = p.start; 
            document.getElementById('eventColor').value = p.color || "#db2777";
            closeDetailsModal(); openModal();
        };

        window.saveAppointment = async () => {
            const btn = document.getElementById('btnSaveMain');
            const prof = document.getElementById('profSelect').value;
            const startStr = document.getElementById('startTime').value;
            if (!prof || !startStr) return alert("Selecione profissional e horário!");
            try {
                btn.disabled = true;
                const duration = parseInt(document.getElementById('duration').value);
                const q = query(collection(db, "appointments"), where("prof", "==", prof));
                const snap = await getDocs(q);
                let conflito = false;
                const newStart = new Date(startStr); const newEnd = new Date(newStart.getTime() + duration * 60000);
                snap.forEach(ds => {
                    if (ds.id === window.selectedEventId) return;
                    const d = ds.data(); if(d.status === 'cancelado') return;
                    const exStart = new Date(d.start); const exEnd = new Date(exStart.getTime() + d.duration * 60000);
                    if (newStart < exEnd && exStart < newEnd) conflito = true;
                });
                if (conflito) { alert("⚠️ Conflito de horário!"); return; }
                const data = {
                    prof, service: document.getElementById('service').value, 
                    price: document.getElementById('price').value,
                    percentage: document.getElementById('percentage').value,
                    start: startStr, duration, color: document.getElementById('eventColor').value,
                    creatorName: userData.name, status: 'agendado'
                };
                if (window.selectedEventId) await updateDoc(doc(db, "appointments", window.selectedEventId), data);
                else await addDoc(collection(db, "appointments"), data);
                closeModal();
            } catch (e) { alert(e.message); } finally { btn.disabled = false; }
        };

        window.handleAuth = async (type) => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            try {
                if (type === 'signup') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), { name: document.getElementById('userName').value, email });
                } else { await signInWithEmailAndPassword(auth, email, pass); }
            } catch (e) { alert(e.message); }
        };
        window.loginWithGoogle = async () => {
            const result = await signInWithPopup(auth, new GoogleAuthProvider());
            await setDoc(doc(db, "users", result.user.uid), { name: result.user.displayName, email: result.user.email }, { merge: true });
        };
        window.logout = () => { signOut(auth); location.reload(); };
        window.openConfirmModal = () => document.getElementById('confirmModal').style.display = 'flex';
        window.closeConfirmModal = () => document.getElementById('confirmModal').style.display = 'none';
        window.executeDelete = async () => { await deleteDoc(doc(db, "appointments", window.selectedEventId)); closeConfirmModal(); closeModal(); };
    </script>
</body>
</html>
