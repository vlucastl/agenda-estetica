<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Estética Compartilhada</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .modal-overlay { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        #calendar { max-width: 1100px; margin: 0 auto; height: 80vh; }
        .fc-event { cursor: pointer; border: none !important; padding: 3px; font-weight: bold; border-radius: 4px; transition: opacity 0.2s; }
        .line-through { text-decoration: line-through; opacity: 0.6; }
        #loadingScreen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .color-sq { width: 36px; height: 36px; border-radius: 6px; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
        .color-sq.active { border-color: #000; transform: scale(1.1); box-shadow: 0 0 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="loadingScreen">
        <div class="text-pink-600 font-bold animate-pulse text-xl text-center">Sincronizando Agenda Coletiva...</div>
    </div>

    <div id="authSection" class="hidden flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
            <h1 class="text-3xl font-bold text-pink-600 mb-6">Acesso ao Sistema</h1>
            <div class="space-y-4 text-left">
                <input type="text" id="userName" placeholder="Nome Completo (Cadastro)" class="w-full border p-3 rounded">
                <input type="email" id="userEmail" placeholder="E-mail" class="w-full border p-3 rounded">
                <div class="relative">
                    <input type="password" id="userPass" placeholder="Senha" class="w-full border p-3 rounded pr-12">
                    <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-xl opacity-50 hover:opacity-100 transition"><span id="eyeIcon">👁️</span></button>
                </div>
                <button onclick="handleAuth('signup')" class="w-full bg-pink-600 text-white p-3 rounded font-bold hover:bg-pink-700 transition">Criar Conta</button>
                <button onclick="handleAuth('login')" class="w-full border border-pink-600 text-pink-600 p-3 rounded font-bold hover:bg-pink-50 transition">Entrar</button>
                <div class="flex items-center my-4"><div class="flex-grow border-t"></div><span class="mx-3 text-gray-400 text-sm">OU</span><div class="flex-grow border-t"></div></div>
                <button onclick="loginWithGoogle()" class="w-full border p-3 rounded flex items-center justify-center gap-2 text-gray-600 hover:bg-gray-50 transition font-medium">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5"> Entrar com Google
                </button>
            </div>
        </div>
    </div>

    <div id="appSection" class="hidden container mx-auto p-4">
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm">
            <h1 class="text-2xl font-bold text-gray-800">Olá, <span id="displayUserName" class="text-pink-600">...</span></h1>
            <div class="flex items-center gap-4">
                <button onclick="selectedEventId = null; openModal();" class="bg-pink-600 text-white py-2 px-6 rounded-full font-bold shadow-lg">+ Novo</button>
                <button onclick="logout()" class="text-red-500 underline text-sm">Sair</button>
            </div>
        </header>
        <div class="bg-white shadow-xl rounded-xl p-4"><div id="calendar"></div></div>
    </div>

    <div id="bookingModal" class="modal-overlay">
        <div class="bg-white rounded-lg p-8 w-full max-w-md shadow-2xl relative">
            <h2 id="modalTitle" class="text-xl font-bold mb-4 border-b pb-2">Agendar Serviço</h2>
            <div class="space-y-4">
                <label class="block text-sm font-medium">Profissional Responsável</label>
                <select id="profSelect" class="w-full border rounded p-2 bg-gray-50"></select>
                <input type="text" id="service" placeholder="Serviço / Cliente" class="w-full border rounded p-2">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="price" placeholder="Valor R$" class="w-full border rounded p-2">
                    <select id="duration" class="w-full border rounded p-2">
                        <option value="30">30 min</option><option value="60">1 hora</option>
                        <option value="90">1h 30m</option><option value="120">2 horas</option>
                    </select>
                </div>
                <input type="datetime-local" id="startTime" class="w-full border rounded p-2">
                <label class="block text-sm font-medium text-gray-700">Cor no Painel</label>
                <input type="hidden" id="eventColor" value="#db2777">
                <div id="colorPalette" class="flex flex-wrap gap-2"></div>
            </div>
            <div class="mt-6 flex justify-between gap-3 pt-4 border-t">
                <button onclick="closeModal()" class="text-gray-500 px-4">Cancelar</button>
                <button id="btnSaveMain" onclick="saveAppointment()" class="bg-pink-600 text-white px-6 py-2 rounded-lg font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <div id="detailsModal" class="modal-overlay">
        <div class="bg-white rounded-lg p-8 w-full max-w-md shadow-2xl relative border-t-8 border-pink-600">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">Detalhes do Agendamento</h2>
            <div class="space-y-3 text-gray-700">
                <p><strong>Profissional:</strong> <span id="detProf"></span></p>
                <p><strong>Serviço:</strong> <span id="detService"></span></p>
                <p><strong>Valor:</strong> R$ <span id="detPrice"></span></p>
                <p><strong>Duração:</strong> <span id="detDuration"></span> min</p>
                <p><strong>Início:</strong> <span id="detStart"></span></p>
                <div class="p-3 bg-pink-50 rounded-lg mt-4 border-l-4 border-pink-600">
                    <p class="text-sm font-medium">Registrado por: <span id="detCreatedBy" class="font-bold"></span></p>
                </div>
            </div>
            <div class="mt-6 space-y-2 pt-4 border-t">
                <div class="flex gap-2">
                    <button onclick="updateStatus('concluido')" class="flex-1 bg-green-600 text-white py-2 rounded-lg font-bold text-sm hover:bg-green-700 transition">✅ Concluir</button>
                    <button onclick="updateStatus('cancelado')" class="flex-1 bg-gray-500 text-white py-2 rounded-lg font-bold text-sm hover:bg-gray-600 transition">🚫 Cancelar</button>
                </div>
                <div class="flex justify-between gap-3">
                    <button onclick="closeDetailsModal()" class="text-gray-500 px-4">Fechar</button>
                    <div class="flex gap-2">
                        <button onclick="openEditFromDetails()" class="bg-gray-800 text-white px-3 py-2 rounded-lg font-bold text-xs">Editar</button>
                        <button onclick="openConfirmModal(); closeDetailsModal();" class="bg-red-500 text-white px-3 py-2 rounded-lg font-bold text-xs">Excluir</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay" style="z-index: 1000;"><div class="bg-white rounded-lg p-6 w-full max-sm shadow-2xl text-center"><h3 class="text-xl font-bold mb-4">Excluir?</h3><div class="flex justify-center gap-3"><button onclick="closeConfirmModal()" class="px-4 py-2 text-gray-500">Voltar</button><button onclick="executeDelete()" class="bg-red-500 text-white px-6 py-2 rounded-lg font-bold">Sim</button></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, deleteDoc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVWRf6EOpZtdhtmJUS-QpK-4u5f8lCORQ",
            authDomain: "agenda-estetica-226d0.firebaseapp.com",
            projectId: "agenda-estetica-226d0",
            storageBucket: "agenda-estetica-226d0.firebasestorage.app",
            messagingSenderId: "420975956032",
            appId: "1:420975956032:web:00d9a7fc7941bb584a8fa5",
            measurementId: "G-70C8XN5SYN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let calendar;
        let selectedEventId = null;
        let userData = {};
        const presetColors = ['#db2777', '#2563eb', '#10b981', '#f59e0b', '#7c3aed', '#dc2626', '#0891b2', '#4b5563', '#1e293b', '#000000'];

        window.togglePassword = () => {
            const pass = document.getElementById('userPass');
            const icon = document.getElementById('eyeIcon');
            if (pass.type === 'password') { pass.type = 'text'; icon.innerText = '🙈'; }
            else { pass.type = 'password'; icon.innerText = '👁️'; }
        };

        function renderColorPalette() {
            const palette = document.getElementById('colorPalette');
            const currentColor = document.getElementById('eventColor').value;
            palette.innerHTML = '';
            presetColors.forEach(color => {
                const div = document.createElement('div');
                div.style.backgroundColor = color;
                div.className = `color-sq ${currentColor === color ? 'active' : ''}`;
                div.onclick = () => { document.getElementById('eventColor').value = color; renderColorPalette(); };
                palette.appendChild(div);
            });
        }

        onAuthStateChanged(auth, async (user) => {
            const loader = document.getElementById('loadingScreen');
            if (user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);
                if (!userDoc.exists()) {
                    userData = { name: user.displayName || user.email.split('@')[0], email: user.email };
                    await setDoc(userDocRef, userData);
                } else { userData = userDoc.data(); }
                document.getElementById('displayUserName').innerText = userData.name;
                initCalendar(); loadProfessionals(); loadEvents();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('appSection').classList.add('hidden');
            }
            if(loader) loader.style.display = 'none';
        });

        async function suggestColorForProf(profName) {
            if (!profName) return;
            const q = query(collection(db, "appointments"), where("prof", "==", profName));
            const snap = await getDocs(q);
            let lastColor = ""; let latest = 0;
            snap.forEach(ds => {
                const d = ds.data(); const time = new Date(d.start).getTime();
                if (time > latest) { latest = time; lastColor = d.color; }
            });
            if (lastColor) { document.getElementById('eventColor').value = lastColor; renderColorPalette(); }
        }

        document.getElementById('profSelect').addEventListener('change', (e) => suggestColorForProf(e.target.value));

        function initCalendar() {
            const el = document.getElementById('calendar');
            if (!el || calendar) return;
            calendar = new FullCalendar.Calendar(el, {
                initialView: 'timeGridWeek', locale: 'pt-br', allDaySlot: false,
                slotMinTime: '08:00:00', slotMaxTime: '20:00:00', selectable: true,
                select: (info) => { selectedEventId = null; openModal(info.startStr.slice(0, 16)); },
                eventClick: (info) => { showDetails(info.event); }
            });
            calendar.render();
        }

        function loadEvents() {
            onSnapshot(collection(db, "appointments"), (snap) => {
                if (calendar) {
                    calendar.removeAllEvents();
                    snap.forEach(doc => {
                        const d = doc.data();
                        let title = `${d.prof}: ${d.service}`;
                        let color = d.color || '#db2777';
                        if (d.status === 'concluido') { title = "✅ " + title; }
                        else if (d.status === 'cancelado') { title = "❌ " + title; color = "#9ca3af"; }
                        calendar.addEvent({
                            id: doc.id, title: title, start: d.start,
                            end: new Date(new Date(d.start).getTime() + d.duration * 60000),
                            backgroundColor: color, extendedProps: { ...d },
                            classNames: d.status === 'cancelado' ? ['line-through'] : [],
                            opacity: d.status === 'concluido' ? '0.5' : '1'
                        });
                    });
                }
            });
        }

        function loadProfessionals() {
            onSnapshot(collection(db, "users"), (snap) => {
                const s = document.getElementById('profSelect');
                if (s) {
                    const cur = s.value; s.innerHTML = '<option value="">Selecione...</option>';
                    snap.forEach(doc => { if (doc.data().name) s.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`; });
                    s.value = cur;
                }
            });
        }

        window.openModal = (date = "") => {
            document.getElementById('bookingModal').style.display = 'flex';
            if (date) document.getElementById('startTime').value = date;
            renderColorPalette();
        };

        window.closeModal = () => { document.getElementById('bookingModal').style.display = 'none'; selectedEventId = null; };

        function showDetails(event) {
            selectedEventId = event.id; const p = event.extendedProps;
            document.getElementById('detProf').innerText = p.prof;
            document.getElementById('detService').innerText = p.service;
            document.getElementById('detPrice').innerText = p.price || "0";
            document.getElementById('detDuration').innerText = p.duration;
            document.getElementById('detStart').innerText = new Date(p.start).toLocaleString('pt-BR');
            document.getElementById('detCreatedBy').innerText = p.creatorName || "Desconhecido";
            document.getElementById('detailsModal').style.display = 'flex';
        }

        window.closeDetailsModal = () => document.getElementById('detailsModal').style.display = 'none';

        window.updateStatus = async (status) => {
            try {
                await updateDoc(doc(db, "appointments", selectedEventId), { status: status });
                closeDetailsModal();
            } catch (e) { alert("Erro: " + e.message); }
        };

        window.openEditFromDetails = () => {
            const event = calendar.getEventById(selectedEventId); const p = event.extendedProps;
            document.getElementById('service').value = p.service; document.getElementById('price').value = p.price;
            document.getElementById('profSelect').value = p.prof; document.getElementById('duration').value = p.duration;
            document.getElementById('startTime').value = p.start; document.getElementById('eventColor').value = p.color || "#db2777";
            closeDetailsModal(); openModal();
        };

        window.saveAppointment = async () => {
            const btn = document.getElementById('btnSaveMain');
            const prof = document.getElementById('profSelect').value;
            const startStr = document.getElementById('startTime').value;
            if (!prof || !startStr) return alert("Selecione profissional e horário!");
            try {
                btn.disabled = true;
                const duration = parseInt(document.getElementById('duration').value);
                const q = query(collection(db, "appointments"), where("prof", "==", prof));
                const snap = await getDocs(q);
                let conflito = false;
                const newStart = new Date(startStr); const newEnd = new Date(newStart.getTime() + duration * 60000);
                snap.forEach(ds => {
                    if (ds.id === selectedEventId) return;
                    const d = ds.data(); if(d.status === 'cancelado') return;
                    const exStart = new Date(d.start); const exEnd = new Date(exStart.getTime() + d.duration * 60000);
                    if (newStart < exEnd && exStart < newEnd) conflito = true;
                });
                if (conflito) { alert("Conflito de horário!"); return; }
                const data = {
                    prof, service: document.getElementById('service').value, price: document.getElementById('price').value,
                    start: startStr, duration, color: document.getElementById('eventColor').value,
                    creatorName: userData.name, status: 'agendado'
                };
                if (selectedEventId) await updateDoc(doc(db, "appointments", selectedEventId), data);
                else await addDoc(collection(db, "appointments"), data);
                closeModal();
            } catch (e) { alert(e.message); } finally { btn.disabled = false; }
        };

        window.handleAuth = async (type) => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            try {
                if (type === 'signup') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), { name: document.getElementById('userName').value, email });
                } else { await signInWithEmailAndPassword(auth, email, pass); }
            } catch (e) { alert(e.message); }
        };
        window.loginWithGoogle = async () => {
            const result = await signInWithPopup(auth, new GoogleAuthProvider());
            await setDoc(doc(db, "users", result.user.uid), { name: result.user.displayName, email: result.user.email }, { merge: true });
        };
        window.logout = () => { signOut(auth); location.reload(); };
        window.openConfirmModal = () => document.getElementById('confirmModal').style.display = 'flex';
        window.closeConfirmModal = () => document.getElementById('confirmModal').style.display = 'none';
        window.executeDelete = async () => { await deleteDoc(doc(db, "appointments", selectedEventId)); closeConfirmModal(); closeModal(); };
    </script>
</body>
</html>
